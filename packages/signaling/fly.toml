# fly.toml app configuration file generated for quantum-os-signaling

app = 'quantum-os-signaling'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4444"

[http_service]
  internal_port = 4444
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
